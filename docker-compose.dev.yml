# docker-compose.dev.yml — DESENVOLVIMENTO LOCAL
# Uso: docker compose -f docker-compose.dev.yml up
#
# Diferenças em relação ao de produção:
# - Usa Dockerfile (php-cli + php artisan serve) — mais rápido para dev
# - Sem Nginx (app expõe porta 8080 diretamente)
# - Sem automacao (evita instalar Chrome localmente)
# - Hot-reload: volume monta o código diretamente

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: express-app
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    environment:
      APP_NAME: Express
      APP_ENV: local
      APP_KEY: base64:LkA6HK4m++UNJxMw+Oq9ckIdIk8v44yZ2JkAGp4QcGw=
      APP_DEBUG: "true"
      APP_TIMEZONE: America/Sao_Paulo
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: express
      DB_USERNAME: express
      DB_PASSWORD: express
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      SESSION_DRIVER: database
      MAIL_MAILER: log
      PAGBANK_EDI_URL: https://edi.api.pagbank.com.br
      # Automação desabilitada no dev (sem Chrome local)
      AUTOMACAO_API_URL: ""
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: express-queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --sleep=3
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    environment:
      APP_ENV: local
      APP_KEY: base64:LkA6HK4m++UNJxMw+Oq9ckIdIk8v44yZ2JkAGp4QcGw=
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: express
      DB_USERNAME: express
      DB_PASSWORD: express
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      SESSION_DRIVER: database
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: express-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: express
      MYSQL_USER: express
      MYSQL_PASSWORD: express
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: express-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  mysql-data:
  vendor:
