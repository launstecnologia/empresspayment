# docker-compose.yml — PRODUÇÃO
# Uso: docker compose up -d --build
#
# Para desenvolvimento local use: docker compose -f docker-compose.dev.yml up

services:

  # ── Nginx — proxy reverso e arquivos estáticos ──────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: express-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html:ro
      - storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/tenants:/etc/nginx/conf.d/tenants:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - app-network

  # ── Laravel (PHP-FPM) ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: express-app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - storage:/var/www/html/storage
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  # ── Queue Worker — filas default + automacao ─────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: express-queue
    restart: unless-stopped
    command: php artisan queue:work --queue=automacao,default --tries=3 --sleep=3 --timeout=900
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - storage:/var/www/html/storage
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      automacao:
        condition: service_started
    networks:
      - app-network

  # ── Scheduler — php artisan schedule:run ────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: express-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - storage:/var/www/html/storage
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  # ── Automação Python (FastAPI + Selenium) ────────────────────────
  automacao:
    build:
      context: .
      dockerfile: docker/automacao/Dockerfile
    container_name: express-automacao
    restart: unless-stopped
    shm_size: '2gb'
    env_file: automacao/.env
    volumes:
      - ./automacao:/app
      - automacao-screenshots:/tmp/automacao_screenshots
      - automacao-db:/tmp/automacao_db
    ports:
      - "8001:8001"
    networks:
      - app-network

  # ── MySQL 8 ──────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: express-mysql
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-express}
      MYSQL_USER: ${DB_USERNAME:-express}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app-network

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: express-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  # ── Certbot (SSL de domínios personalizados de marketplace) ─────
  certbot:
    image: certbot/certbot:latest
    container_name: express-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - ./docker/nginx/certs:/etc/letsencrypt
    networks:
      - app-network

# ── Volumes persistentes ─────────────────────────────────────────
volumes:
  vendor:
  storage:
  mysql-data:
  redis-data:
  nginx-logs:
  certbot-www:
  automacao-screenshots:
  automacao-db:

# ── Rede interna ─────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
