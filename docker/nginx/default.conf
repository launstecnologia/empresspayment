# Redireciona HTTP → HTTPS (domínio principal)
server {
    listen 80;
    server_name express.app.br www.express.app.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://express.app.br$request_uri;
    }
}

# Redireciona HTTP → HTTPS (subdomínios wildcard)
server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.express\.app\.br$;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl;
    http2 on;
    server_name express.app.br www.express.app.br;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Redireciona www → sem www
    if ($host = www.express.app.br) {
        return 301 https://express.app.br$request_uri;
    }

    root /var/www/html/public;
    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    client_max_body_size 40M;

    # Re-resolve app:9000 quando o container PHP for recriado (DNS interno Docker)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Arquivos estáticos com cache longo
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        set $php_upstream app:9000;
        fastcgi_pass   $php_upstream;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  HTTPS $https if_not_empty;
        fastcgi_param  HTTP_X_FORWARDED_PROTO $scheme;
        include        fastcgi_params;

        fastcgi_read_timeout  300;
        fastcgi_buffer_size   128k;
        fastcgi_buffers       4 256k;
    }

    # Bloqueia arquivos sensíveis
    location ~ /\.(env|git|htaccess) {
        deny all;
    }

    # Uploads públicos (logos whitelabel, etc.) — symlink public/storage
    location /storage {
        alias /var/www/html/storage/app/public;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ~ /(bootstrap/cache|vendor)/ {
        deny all;
    }
}

# HTTPS subdomínios wildcard (*.express.app.br)
server {
    listen 443 ssl;
    http2 on;
    server_name ~^(?<subdomain>.+)\.express\.app\.br$;

    # Certificado wildcard (gerado com certbot --manual --preferred-challenges dns)
    ssl_certificate     /etc/nginx/certs/wildcard-cert.pem;
    ssl_certificate_key /etc/nginx/certs/wildcard-key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
