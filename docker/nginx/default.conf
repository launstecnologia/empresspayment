server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Tamanho máximo de upload (deve bater com o PHP)
    client_max_body_size 40M;

    # Arquivos estáticos com cache longo
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel — todas as requisições passam pelo index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_read_timeout  300;
        fastcgi_buffer_size   128k;
        fastcgi_buffers       4 256k;
    }

    # Bloqueia acesso a arquivos sensíveis
    location ~ /\.(env|git|htaccess) {
        deny all;
    }

    location ~ /(storage|bootstrap/cache|vendor)/ {
        deny all;
    }
}
